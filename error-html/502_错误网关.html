<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>错误网关</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #dd6b20 0%, #c05621 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #dd6b20 0%, #c05621 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      h1 {
        color: #2d3748;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .message {
        color: #4a5568;
        font-size: 18px;
        line-height: 1.8;
        margin-bottom: 30px;
      }
      .alert-type {
        background: linear-gradient(135deg, #dd6b20 0%, #c05621 100%);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 25px;
        display: inline-block;
        box-shadow: 0 4px 15px rgba(192, 86, 33, 0.4);
      }
      .details {
        background: #fffaf0;
        border-left: 4px solid #dd6b20;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        border-radius: 0 10px 10px 0;
      }
      .details h3 {
        color: #2d3748;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: 600;
      }
      .details p {
        color: #718096;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #dd6b20 0%, #c05621 100%);
        color: white;
        padding: 12px 30px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        margin-top: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(192, 86, 33, 0.4);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(192, 86, 33, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      <h1>错误网关</h1>
      <div class="alert-type">502 Bad Gateway</div>
      <div class="message">抱歉，服务器作为网关或代理时，从上游服务器收到了无效响应。</div>
      <div class="details">
        <h3>可能的原因</h3>
        <p>• 上游服务器暂时不可用</p>
        <p>• 网络连接问题</p>
        <p>• 服务器正在维护中</p>
      </div>
      <a href="/" class="btn">返回首页</a>
    </div>
  </body>
</html>
