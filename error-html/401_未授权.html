<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>未授权访问</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      h1 {
        color: #2d3748;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .message {
        color: #4a5568;
        font-size: 18px;
        line-height: 1.8;
        margin-bottom: 30px;
      }
      .alert-type {
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 25px;
        display: inline-block;
        box-shadow: 0 4px 15px rgba(45, 55, 72, 0.4);
      }
      .details {
        background: #f7fafc;
        border-left: 4px solid #4a5568;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        border-radius: 0 10px 10px 0;
      }
      .details h3 {
        color: #2d3748;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: 600;
      }
      .details p {
        color: #718096;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        color: white;
        padding: 12px 30px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        margin-top: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(45, 55, 72, 0.4);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(45, 55, 72, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
      </div>
      <h1>未授权访问</h1>
      <div class="alert-type">401 Unauthorized</div>
      <div class="message">抱歉，您需要登录或提供有效凭证才能访问此资源。</div>
      <div class="details">
        <h3>可能的原因</h3>
        <p>• 未登录或会话已过期</p>
        <p>• 缺少有效的身份验证凭证</p>
        <p>• 认证令牌无效或已过期</p>
      </div>
      <a href="/" class="btn">返回首页</a>
    </div>
  </body>
</html>
